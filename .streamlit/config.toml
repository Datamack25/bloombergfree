[theme]
base            = "dark"
backgroundColor          = "#0a0a0f"
secondaryBackgroundColor = "#0f0f1a"
textColor                = "#e8e8f0"
primaryColor             = "#0ea5e9"
font                     = "monospace"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection= false

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
